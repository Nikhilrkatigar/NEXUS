services:
  - type: web
    name: nexus-event-management
    env: node
    region: oregon
    plan: free
    startCommand: npm start
    buildCommand: npm install
    healthCheckPath: /api/health
    healthCheckInterval: 300
    maxShutdownDelay: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
