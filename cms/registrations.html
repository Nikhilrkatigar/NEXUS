<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Registrations - NEXUS CMS</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dwqffkzp0/image/upload/v1775916069/Gemini_Generated_Image_7zzc6z7zzc6z7zzc_klsqtk.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#060810">
<meta name="description" content="NEXUS CMS - Event Management & Championship Platform">
<script src="cms-core.js"></script>
<style id="cmsStyle"></style>
</head>
<body>
<div id="sidebarContainer"></div>
<main class="cms-main">
  <div class="cms-header" style="display:flex;justify-content:space-between;align-items:flex-start">
    <div><h1>Registrations</h1><p>All registered teams and participants</p></div>
    <div style="display:flex;gap:10px">
      <button class="cms-btn cms-btn-primary" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>
  <div class="cms-card" style="margin-bottom:20px">
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
      <input type="text" id="searchInput" placeholder="Search by college, event, code..." style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;flex:1;min-width:200px" oninput="renderTable()">
      <select id="eventFilter" style="background:#111827;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;color:#f0f0f0;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;font-weight:500" onchange="renderTable()">
        <option value="">All Events</option>
      </select>
      <div style="font-size:13px;color:var(--muted)" id="countLabel"></div>
    </div>
  </div>
  <div class="cms-card">
    <table class="cms-table" id="regsTable">
      <thead><tr>
        <th>#</th><th>Code</th><th>College</th><th>Event</th><th>Group Leader</th><th>Faculty</th><th>Participants</th><th>Payment</th><th>Date</th><th>Actions</th>
      </tr></thead>
      <tbody id="regsTbody"></tbody>
    </table>
  </div>
</main>

<div id="detailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:800;align-items:center;justify-content:center;backdrop-filter:blur(10px)">
  <div style="background:#111827;border:1px solid rgba(245,166,35,0.2);border-radius:20px;padding:40px;max-width:560px;width:90%;position:relative;max-height:80vh;overflow-y:auto">
    <button onclick="document.getElementById('detailModal').style.display='none'" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer">x</button>
    <div style="position:absolute;top:16px;right:50px;display:flex;gap:8px">
      <button onclick="editRegistration(currentEditingId)" style="background:rgba(245,166,35,0.1);color:#f5a623;border:1px solid rgba(245,166,35,0.3);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600">✎ Edit</button>
      <button onclick="deleteRegistration(currentEditingId)" style="background:rgba(230,60,92,0.1);color:#e63c5c;border:1px solid rgba(230,60,92,0.3);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600">🗑 Delete</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<script>
let regs = [];
let currentEditingId = null;

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const eventFilter = document.getElementById('eventFilter').value;
  const filtered = regs.filter((registration) => {
    const matchSearch =
      !search ||
      registration.college.toLowerCase().includes(search) ||
      registration.event.toLowerCase().includes(search) ||
      registration.code.toLowerCase().includes(search) ||
      (registration.leader || '').toLowerCase().includes(search);
    const matchEvent = !eventFilter || registration.event === eventFilter;
    return matchSearch && matchEvent;
  });

  document.getElementById('countLabel').textContent = `${filtered.length} registration${filtered.length !== 1 ? 's' : ''}`;
  document.getElementById('regsTbody').innerHTML = filtered.length
    ? filtered.map((registration, index) => {
        const paymentStatus = registration.paymentStatus || 'pending';
        const paymentBadge = paymentStatus === 'verified' 
          ? '<span class="badge badge-green" style="font-size:10px">✓ Verified</span>'
          : '<span class="badge badge-yellow" style="font-size:10px">⏳ Pending</span>';
        return `
      <tr>
        <td style="color:var(--muted);font-size:12px">${index + 1}</td>
        <td><span class="badge badge-gold">#${registration.code}</span></td>
        <td style="font-weight:500">${registration.college}</td>
        <td><span class="badge badge-blue" style="font-size:10px;white-space:nowrap">${registration.event}</span></td>
        <td style="font-size:12px">${registration.leader || '-'}</td>
        <td style="font-size:12px;color:var(--muted)">${registration.faculty || '-'}</td>
        <td style="font-size:12px;color:var(--muted)">${(registration.participants || []).filter((participant) => participant.name).length} participant(s)</td>
        <td>${paymentBadge}</td>
        <td style="font-size:11px;color:var(--muted)">${new Date(registration.timestamp).toLocaleDateString()}</td>
        <td><button class="cms-btn cms-btn-sm" style="background:rgba(245,166,35,0.1);color:#f5a623;border:none;cursor:pointer" onclick="viewDetail('${registration.id}')">View</button></td>
      </tr>
    `;
      }).join('')
    : '<tr><td colspan="10" style="text-align:center;color:var(--muted);padding:24px">No registrations found</td></tr>';
}

function viewDetail(id) {
  const registration = regs.find((entry) => String(entry.id) === String(id));
  if (!registration) {
    console.warn("Registration not found with id:", id);
    return;
  }

  currentEditingId = id;

  console.log("=== VIEWING REGISTRATION DETAIL ===");
  console.log("Registration ID:", id);
  console.log("Registration Code:", registration.code);
  console.log("Payment Status:", registration.paymentStatus);
  console.log("Payment Screenshot Filename:", registration.paymentScreenshot);
  console.log("Payment Screenshot Path:", registration.paymentScreenshotPath);
  console.log("Full registration object:", registration);
  console.log("=====================================");

  const paymentStatus = registration.paymentStatus || 'pending';
  const paymentStatusDisplay = paymentStatus === 'verified' 
    ? '<span style="color:#10b981;font-weight:600">✓ Verified</span>'
    : '<span style="color:#f5a623;font-weight:600">⏳ Pending Verification</span>';

  let paymentSection = `
    <div style="background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.2);border-radius:8px;padding:16px;margin-top:16px">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Payment Status</div>
      <div style="font-size:14px;margin-bottom:12px">${paymentStatusDisplay}</div>
  `;

  if (registration.paymentScreenshot) {
    paymentSection += `
      <div style="margin-top:12px">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Screenshot</div>
        <img src="/api/cms/payment-screenshot/${registration.code}" alt="Payment Screenshot" style="max-width:100%;height:auto;border-radius:8px;border:1px solid rgba(245,166,35,0.2);cursor:pointer" onclick="viewScreenshot('${registration.code}')" onerror="this.style.borderColor='#e63c5c'; this.alt='Failed to load screenshot';" />
        <p style="font-size:11px;color:var(--muted);margin-top:8px">Click to view full size</p>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="cms-btn cms-btn-sm" style="background:rgba(16,185,129,0.1);color:#10b981;border:none;cursor:pointer;flex:1" onclick="verifyPayment('${registration.code}')">✓ Verify Payment</button>
        <button class="cms-btn cms-btn-sm" style="background:rgba(230,60,92,0.1);color:#e63c5c;border:none;cursor:pointer;flex:1" onclick="rejectPayment('${registration.code}')">✕ Reject</button>
      </div>
    `;
  } else {
    paymentSection += `
      <div style="color:var(--muted);font-size:12px;margin-top:8px">No payment screenshot uploaded yet</div>
    `;
  }

  paymentSection += '</div>';

  document.getElementById('detailContent').innerHTML = `
    <div style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#f5a623;margin-bottom:8px">Registration Details</div>
    <div style="font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:#f5a623;letter-spacing:0.15em;padding:16px;background:rgba(245,166,35,0.06);border-radius:12px;border:1px dashed rgba(245,166,35,0.2);text-align:center;margin-bottom:24px">#${registration.code}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      ${[
        ['College', registration.college],
        ['Event', registration.event],
        ['Tracks', (registration.registeredEvents || []).join(', ') || '-'],
        ['Email', registration.email || '-'],
        ['Faculty', registration.faculty || '-'],
        ['Group Leader', registration.leader || '-'],
        ['Registered', new Date(registration.timestamp).toLocaleString()]
      ].map(([label, value]) => `
        <div style="background:rgba(255,255,255,0.03);border-radius:8px;padding:12px">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">${label}</div>
          <div style="font-size:13px;font-weight:500">${value}</div>
        </div>
      `).join('')}
    </div>
    ${paymentSection}
    ${(registration.participants || []).filter((participant) => participant.name).length ? `
      <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--muted);margin-top:20px">Participants</div>
      ${(registration.participants || []).filter((participant) => participant.name).map((participant, index) => `
        <div style="display:flex;justify-content:space-between;gap:12px;padding:10px 14px;background:rgba(255,255,255,0.02);border-radius:8px;margin-bottom:6px;font-size:13px">
          <div>
            <div>${index + 1}. ${participant.name}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px">
              ${participant.department || '-'}
              ${participant.danceParticipant ? ' | Dance' : ''}
              ${participant.rampWalkParticipant ? ' | Ramp Walk' : ''}
            </div>
          </div>
          <span style="color:var(--muted)">${participant.phone || '-'}</span>
        </div>
      `).join('')}
    ` : ''}
  `;

  document.getElementById('detailModal').style.display = 'flex';
}

async function exportCSV() {
  const headers = ['Code', 'College', 'Address', 'Email', 'Event', 'Tracks', 'Faculty', 'Group Leader', 'Participants', 'Payment Status', 'Date'];
  const rows = regs.map((registration) => [
    registration.code,
    registration.college,
    registration.address || '',
    registration.email || '',
    registration.event,
    (registration.registeredEvents || []).join('; '),
    registration.faculty || '',
    registration.leader || '',
    (registration.participants || []).filter((participant) => participant.name).map((participant) => participant.name).join('; '),
    registration.paymentStatus || 'pending',
    new Date(registration.timestamp).toLocaleString()
  ]);
  const csv = [headers, ...rows].map((row) => row.map((value) => `"${String(value).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'nexus_registrations.csv';
  link.click();
  await NexusCMS.addAuditLog('Exported registrations CSV');
  showToast('Registrations exported!');
}

function viewScreenshot(code) {
  const modal = document.createElement('div');
  modal.style.cssText = `
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  `;
  
  modal.innerHTML = `
    <div style="position: relative; max-width: 90vw; max-height: 90vh;">
      <button onclick="this.parentElement.parentElement.remove()" style="
        position: absolute;
        top: -40px;
        right: 0;
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
      ">✕</button>
      <img src="/api/cms/payment-screenshot/${code}" alt="Payment Screenshot" style="
        max-width: 100%;
        max-height: 90vh;
        border-radius: 8px;
      " />
    </div>
  `;
  
  document.body.appendChild(modal);
}

async function verifyPayment(code) {
  if (!confirm('Mark this payment as verified?')) return;
  
  try {
    const token = sessionStorage.getItem("nexus_token") || "";
    const response = await fetch(`/api/cms/registrations/${code}/verify-payment`, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      }
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || 'Verification failed');
    }

    // Update registration in local list
    const reg = regs.find(r => r.code === code);
    if (reg) {
      reg.paymentStatus = 'verified';
    }

    showToast('✓ Payment verified successfully');
    document.getElementById('detailModal').style.display = 'none';
    renderTable();
    await NexusCMS.addAuditLog(`Verified payment for registration: ${code}`);
  } catch (error) {
    showToast(error.message, 'error');
  }
}

async function rejectPayment(code) {
  if (!confirm('Reject this payment? The user will need to resubmit.')) return;
  
  try {
    const token = sessionStorage.getItem("nexus_token") || "";
    const response = await fetch(`/api/cms/registrations/${code}/reject-payment`, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      }
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || 'Rejection failed');
    }

    // Update registration in local list
    const reg = regs.find(r => r.code === code);
    if (reg) {
      reg.paymentStatus = 'pending';
      reg.paymentScreenshot = '';
    }

    showToast('Payment rejected - user can resubmit');
    document.getElementById('detailModal').style.display = 'none';
    renderTable();
    await NexusCMS.addAuditLog(`Rejected payment for registration: ${code}`);
  } catch (error) {
    showToast(error.message, 'error');
  }
}

async function deleteRegistration(id) {
  const registration = regs.find((entry) => String(entry.id) === String(id));
  if (!registration) return;

  if (!confirm(`Are you sure you want to delete registration #${registration.code} from ${registration.college}?\n\nThis action cannot be undone.`)) {
    return;
  }

  try {
    const token = sessionStorage.getItem("nexus_token") || ""; 
    const response = await fetch(`/api/cms/registrations/${registration.code}`, {
      method: 'DELETE',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      }
    });

    if (!response.ok) {
      const data = await response.json();
      throw new Error(data.message || 'Delete failed');
    }

    // Remove from local array
    regs = regs.filter(r => String(r.id) !== String(id));

    showToast(`✓ Registration #${registration.code} deleted successfully`);
    document.getElementById('detailModal').style.display = 'none';
    renderTable();
    await NexusCMS.addAuditLog(`Deleted registration: ${registration.code} (${registration.college})`);
  } catch (error) {
    showToast(error.message, 'error');
  }
}

async function editRegistration(id) {
  const registration = regs.find((entry) => String(entry.id) === String(id));
  if (!registration) return;

  const newCollege = prompt('College Name:', registration.college);
  if (newCollege === null) return;

  const newEmail = prompt('Email:', registration.email);
  if (newEmail === null) return;

  const newLeader = prompt('Team Leader:', registration.leader);
  if (newLeader === null) return;

  try {
    const token = sessionStorage.getItem("nexus_token") || "";
    const response = await fetch(`/api/cms/registrations/${registration.code}`, {
      method: 'PUT',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        college: newCollege,
        email: newEmail,
        leader: newLeader
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || 'Update failed');
    }

    // Update local registration
    const regIndex = regs.findIndex(r => String(r.id) === String(id));
    if (regIndex !== -1) {
      regs[regIndex] = data.registration;
    }

    showToast('✓ Registration updated successfully');
    currentEditingId = id;
    viewDetail(id); // Refresh the view
    renderTable();
    await NexusCMS.addAuditLog(`Updated registration: ${registration.code}`);
  } catch (error) {
    showToast(error.message, 'error');
  }
}

(async function () {
  const user = await NexusCMS.initPage('registrations');
  if (!user) return;

  await NexusCMS.addAuditLog('Viewed Registrations');
  regs = await NexusCMS.fetchRegistrations();

  const events = [...new Set(regs.map((registration) => registration.event))];
  events.forEach((eventName) => {
    const option = document.createElement('option');
    option.value = eventName;
    option.textContent = eventName;
    document.getElementById('eventFilter').appendChild(option);
  });

  renderTable();
})();
</script>

<!-- PWA Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then((reg) => {
        console.log('[App] Service Worker registered:', reg);
        setInterval(() => {
          reg.update().catch(err => console.warn('[App] Update check failed:', err));
        }, 60000);
      })
      .catch((err) => console.warn('[App] Service Worker registration failed:', err));
  });
}
</script>
</body>
</html>
