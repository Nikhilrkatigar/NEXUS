<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Audit Log - NEXUS CMS</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dwqffkzp0/image/upload/v1775916069/Gemini_Generated_Image_7zzc6z7zzc6z7zzc_klsqtk.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#060810">
<meta name="description" content="NEXUS CMS - Event Management & Championship Platform">
<script src="cms-core.js"></script>
<style id="cmsStyle"></style>
</head>
<body>
<div id="sidebarContainer"></div>
<main class="cms-main">
  <div class="cms-header" style="display:flex;justify-content:space-between;align-items:flex-start">
    <div><h1>Audit Log</h1><p>Track all CMS actions with user and timestamp</p></div>
    <div style="display:flex;gap:10px">
      <button class="cms-btn cms-btn-primary" onclick="exportAudit()">Export CSV</button>
      <button class="cms-btn cms-btn-danger" onclick="clearAudit()">Clear Log</button>
    </div>
  </div>
  <div class="cms-card" style="margin-bottom:16px">
    <div style="display:flex;gap:12px;align-items:center">
      <input type="text" id="auditSearch" placeholder="Search actions, users..." style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;flex:1" oninput="renderAudit()">
      <span id="auditCount" style="font-size:13px;color:var(--muted)"></span>
    </div>
  </div>
  <div class="cms-card">
    <table class="cms-table" id="auditTable">
      <thead><tr><th>#</th><th>Timestamp</th><th>Action</th><th>User</th><th>IP</th></tr></thead>
      <tbody id="auditTbody"></tbody>
    </table>
  </div>
</main>

<!-- Confirmation Modal -->
<div id="confirmModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9000;align-items:center;justify-content:center;backdrop-filter:blur(10px)">
  <div style="background:#111827;border:1px solid rgba(245,166,35,0.2);border-radius:16px;padding:32px;max-width:400px;width:90%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
    <div style="font-size:16px;font-weight:600;margin-bottom:16px;color:#f0f0f0" id="confirmTitle"></div>
    <div style="font-size:14px;color:#7a8499;margin-bottom:24px" id="confirmMessage"></div>
    <div style="display:flex;gap:12px;justify-content:flex-end">
      <button onclick="closeConfirmModal()" style="background:rgba(255,255,255,0.05);color:#f0f0f0;border:1px solid rgba(255,255,255,0.1);padding:10px 20px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:all 0.2s">Cancel</button>
      <button onclick="confirmAction()" style="background:linear-gradient(135deg,#f5a623,#d4890f);color:#000;border:none;padding:10px 20px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:all 0.2s">Confirm</button>
    </div>
  </div>
</div>

<script>
let pendingConfirmCallback = null;
let logs = [];

function renderAudit() {
  const search = document.getElementById('auditSearch').value.toLowerCase();
  const filtered = search
    ? logs.filter((entry) => entry.action.toLowerCase().includes(search) || entry.user.toLowerCase().includes(search))
    : logs;

  document.getElementById('auditCount').textContent = `${filtered.length} entries`;
  document.getElementById('auditTbody').innerHTML = filtered.length
    ? filtered.map((entry, index) => `
      <tr>
        <td style="color:var(--muted);font-size:11px">${index + 1}</td>
        <td style="font-size:12px;color:var(--muted);white-space:nowrap">${new Date(entry.timestamp).toLocaleString()}</td>
        <td style="font-size:13px">${entry.action}</td>
        <td><span class="badge badge-blue" style="font-size:10px">${entry.user}</span></td>
        <td style="font-size:12px;color:var(--muted);font-family:monospace">${entry.ip || '-'}</td>
      </tr>
    `).join('')
    : '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">No audit entries</td></tr>';
}

function exportAudit() {
  const csv = [['#', 'Timestamp', 'Action', 'User', 'IP'], ...logs.map((entry, index) => [index + 1, entry.timestamp, entry.action, entry.user, entry.ip || '-'])]
    .map((row) => row.map((value) => `"${value}"`).join(','))
    .join('\n');
  const link = document.createElement('a');
  link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  link.download = 'nexus_audit.csv';
  link.click();
  showToast('Audit log exported!');
}

function showConfirmModal(title, message, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').textContent = message;
  pendingConfirmCallback = callback;
  document.getElementById('confirmModal').style.display = 'flex';
}

function closeConfirmModal() {
  document.getElementById('confirmModal').style.display = 'none';
  pendingConfirmCallback = null;
}

function confirmAction() {
  closeConfirmModal();
  if (pendingConfirmCallback) {
    pendingConfirmCallback();
  }
}

async function clearAudit() {
  showConfirmModal(
    'Clear Audit Log?',
    'This will permanently delete all audit log entries. This action cannot be undone.',
    async function() {
      await NexusCMS.clearAuditLog();
      logs = await NexusCMS.fetchAuditLog();
      showToast('Audit log cleared');
      renderAudit();
    }
  );
}

(async function () {
  const user = await NexusCMS.initPage('audit', { requiredRoles: ['superadmin'] });
  if (!user) return;

  await NexusCMS.addAuditLog('Viewed Audit Log');
  logs = await NexusCMS.fetchAuditLog();
  renderAudit();
})();
</script>

<!-- PWA Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(reg => {
        setInterval(() => reg.update().catch(() => {}), 60000);
      }).catch(() => {});
  });
}
</script>
</body>
</html>
