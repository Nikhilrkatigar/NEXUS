<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page Settings - NEXUS CMS</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#060810">
<meta name="description" content="NEXUS CMS - Event Management & Championship Platform">
<script src="cms-core.js"></script>
<style id="cmsStyle"></style>
<style>
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.editor-block{margin-top:24px}
.editor-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.entity-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.entity-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:18px}
.entity-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.preview-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:12px;border-radius:12px;background:rgba(255,255,255,0.03)}
.preview-avatar{width:68px;height:68px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#000;background:linear-gradient(135deg,#f5a623,#e63c5c);flex-shrink:0}
.preview-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.preview-meta{min-width:0}
.preview-name{font-weight:700}
.preview-role{font-size:12px;color:var(--muted);margin-top:4px}
.upload-row{display:flex;gap:8px;align-items:center}
.upload-row input[type="file"]{padding:10px}
.upload-note{font-size:11px;color:var(--muted);margin-top:6px}
.helper{font-size:12px;color:var(--muted)}
@media(max-width:900px){.settings-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="sidebarContainer"></div>
<main class="cms-main">
  <div class="cms-header" style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap">
    <div><h1>Page Settings</h1><p>Edit the landing page content and Organisers & Faculty cards.</p></div>
    <div style="display:flex;gap:10px">
      <a href="../index.html" target="_blank" class="cms-btn" style="background:rgba(245,166,35,0.1);color:#f5a623;text-decoration:none;padding:10px 20px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px">Preview</a>
      <button class="cms-btn cms-btn-primary" onclick="saveSettings()">Save All Changes</button>
    </div>
  </div>

  <div class="settings-grid">
    <div class="cms-card">
      <div class="cms-card-title">Event Identity</div>
      <div class="form-group"><label>Event Name</label><input type="text" id="s_eventName"></div>
      <div class="form-group"><label>Event Subtitle</label><input type="text" id="s_eventSubtitle"></div>
      <div class="form-group"><label>College Name</label><input type="text" id="s_collegeName"></div>
      <div class="form-group"><label>Department</label><input type="text" id="s_department"></div>
      <div class="form-group"><label>Fest Date</label><input type="date" id="s_festDate"></div>
    </div>

    <div class="cms-card">
      <div class="cms-card-title">Hero Section</div>
      <div class="form-group"><label>Hero Description</label><textarea id="s_heroDesc" rows="3"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Teams Stat</label><input type="text" id="s_statTeams" placeholder="50+"></div>
        <div class="form-group"><label>Events Stat</label><input type="text" id="s_statEvents" placeholder="10+"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Colleges Stat</label><input type="text" id="s_statColleges" placeholder="20+"></div>
        <div class="form-group"><label>Prize Pool Stat</label><input type="text" id="s_statPrize" placeholder="Rs 50K+"></div>
      </div>
    </div>

    <div class="cms-card">
      <div class="cms-card-title">About Section</div>
      <div class="form-group"><label>About Title</label><input type="text" id="s_aboutTitle"></div>
      <div class="form-group"><label>About Description</label><textarea id="s_aboutDesc" rows="3"></textarea></div>
    </div>

    <div class="cms-card">
      <div class="cms-card-title">Prize Details</div>
      <div class="form-group"><label>1st Prize</label><input type="text" id="s_prize1" placeholder="Rs 30,000"></div>
      <div class="form-group"><label>2nd Prize</label><input type="text" id="s_prize2" placeholder="Rs 15,000"></div>
      <div class="form-group"><label>3rd Prize</label><input type="text" id="s_prize3" placeholder="Rs 5,000"></div>
      <div class="form-group"><label>Prizes Section Title</label><input type="text" id="s_prizesTitle"></div>
    </div>

    <div class="cms-card">
      <div class="cms-card-title">College Leadership</div>
      <div class="form-group"><label>Principal Name</label><input type="text" id="s_principalName" placeholder="Dr. ..."></div>
      <div class="form-group"><label>Chairman Name</label><input type="text" id="s_chairmanName" placeholder="..."></div>
      <div class="form-group"><label>HOD Name</label><input type="text" id="s_hodName" placeholder="Prof. ..."></div>
    </div>

    <div class="cms-card">
      <div class="cms-card-title">Footer</div>
      <div class="form-group"><label>Footer Description</label><textarea id="s_footerDesc" rows="3"></textarea></div>
      <div class="form-group"><label>Footer College/Dept Text</label><input type="text" id="s_footerCollege"></div>
    </div>
  </div>

  <div class="cms-card editor-block">
    <div class="editor-actions">
      <div>
        <div class="cms-card-title" style="margin-bottom:4px">Organisers & Faculty</div>
        <p class="helper">Add, remove, and edit cards. Each card supports an uploaded image or a direct image link.</p>
      </div>
      <button class="cms-btn cms-btn-primary" onclick="addTeamMember()">Add Member Box</button>
    </div>
    <div id="teamEditorGrid" class="entity-grid"></div>
  </div>
</main>
<script>
const FORM_KEYS = [
  'eventName','eventSubtitle','collegeName','department','heroDesc','aboutTitle','aboutDesc',
  'prize1','prize2','prize3','prizesTitle','statTeams','statEvents','statColleges','statPrize',
  'festDate','principalName','chairmanName','hodName','footerDesc','footerCollege'
];

let settings = {};
let teamMembers = [];

function uid(prefix) {
  return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
}

function inferInitial(name) {
  const cleaned = String(name || '').trim();
  if (!cleaned) return '';
  const letters = cleaned.split(/\s+/).map((part) => part[0]).join('').slice(0, 2).toUpperCase();
  return letters || cleaned.slice(0, 2).toUpperCase();
}

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function makeTeamMember() {
  return {
    id: uid('team'),
    name: '',
    role: '',
    dept: '',
    deptColor: '#f5a623',
    initial: '',
    bg: 'linear-gradient(135deg,#f5a623,#e63c5c)',
    imageUrl: ''
  };
}

function renderTeamMembers() {
  const grid = document.getElementById('teamEditorGrid');
  grid.innerHTML = teamMembers.map((member, index) => `
    <div class="entity-card">
      <div class="entity-card-header">
        <strong>Member ${index + 1}</strong>
        <button class="cms-btn cms-btn-danger cms-btn-sm" onclick="removeTeamMember('${member.id}')">Remove</button>
      </div>
      <div class="preview-row">
        <div class="preview-avatar" style="background:${member.bg}">
          ${member.imageUrl ? `<img src="${member.imageUrl}" alt="${member.name || 'Team member'}">` : `${member.initial || inferInitial(member.name) || '?'}`}
        </div>
        <div class="preview-meta">
          <div class="preview-name">${member.name || 'New member'}</div>
          <div class="preview-role">${member.role || 'Role not set'}</div>
          <div class="team-dept" style="display:inline-block;margin-top:8px;background:${member.deptColor}15;color:${member.deptColor};padding:4px 10px;border-radius:999px;font-size:11px">${member.dept || 'Department'}</div>
        </div>
      </div>
      <div class="form-group"><label>Name</label><input type="text" value="${member.name || ''}" oninput="updateTeamMember('${member.id}','name',this.value)"></div>
      <div class="form-group"><label>Role</label><input type="text" value="${member.role || ''}" oninput="updateTeamMember('${member.id}','role',this.value)"></div>
      <div class="form-row">
        <div class="form-group"><label>Department Label</label><input type="text" value="${member.dept || ''}" oninput="updateTeamMember('${member.id}','dept',this.value)"></div>
        <div class="form-group"><label>Initials</label><input type="text" value="${member.initial || ''}" placeholder="Auto if blank" oninput="updateTeamMember('${member.id}','initial',this.value.toUpperCase())"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Badge Color</label><input type="color" value="${member.deptColor || '#f5a623'}" style="height:46px" oninput="updateTeamMember('${member.id}','deptColor',this.value)"></div>
        <div class="form-group"><label>Avatar Gradient</label><input type="text" value="${member.bg || ''}" placeholder="linear-gradient(...)" oninput="updateTeamMember('${member.id}','bg',this.value)"></div>
      </div>
      <div class="form-group"><label>Image Link</label><input type="url" value="${member.imageUrl || ''}" placeholder="https://example.com/photo.jpg" oninput="updateTeamMember('${member.id}','imageUrl',this.value)"></div>
      <div class="form-group">
        <label>Upload Image</label>
        <div class="upload-row">
          <input type="file" accept="image/*" id="team_upload_${member.id}">
          <button class="cms-btn cms-btn-primary cms-btn-sm" onclick="uploadTeamMemberImage('${member.id}')">Upload</button>
        </div>
        <div class="upload-note">Upload replaces the image link for this card.</div>
      </div>
    </div>
  `).join('');
}

function updateTeamMember(id, key, value) {
  teamMembers = teamMembers.map((member) => {
    if (member.id !== id) return member;
    const next = { ...member, [key]: value };
    if (key === 'name' && (!member.initial || member.initial === inferInitial(member.name))) {
      next.initial = inferInitial(value);
    }
    return next;
  });
  renderTeamMembers();
}

function addTeamMember() {
  teamMembers.push(makeTeamMember());
  renderTeamMembers();
}

function removeTeamMember(id) {
  teamMembers = teamMembers.filter((member) => member.id !== id);
  renderTeamMembers();
}

async function uploadTeamMemberImage(id) {
  const input = document.getElementById(`team_upload_${id}`);
  const file = input && input.files ? input.files[0] : null;
  if (!file) {
    showToast('Choose an image first.', 'error');
    return;
  }

  try {
    const imageUrl = await NexusCMS.uploadImage(file);
    updateTeamMember(id, 'imageUrl', imageUrl);
    showToast('Image uploaded successfully!');
  } catch (error) {
    showToast(error.message || 'Upload failed', 'error');
  }
}

async function saveSettings() {
  const newSettings = { ...settings };

  FORM_KEYS.forEach((key) => {
    const element = document.getElementById(`s_${key}`);
    if (element) {
      newSettings[key] = element.value;
    }
  });

  newSettings.teamMembers = teamMembers.map((member) => ({
    id: member.id || uid('team'),
    name: String(member.name || '').trim(),
    role: String(member.role || '').trim(),
    dept: String(member.dept || '').trim(),
    deptColor: String(member.deptColor || '#f5a623'),
    initial: String(member.initial || inferInitial(member.name)).trim().slice(0, 3).toUpperCase(),
    bg: String(member.bg || 'linear-gradient(135deg,#f5a623,#e63c5c)').trim(),
    imageUrl: String(member.imageUrl || '').trim()
  })).filter((member) => member.name);

  await NexusCMS.updateSettings(newSettings);
  settings = newSettings;
  showToast('Page settings saved!');
}

(async function () {
  const user = await NexusCMS.initPage('settings', { requiredRoles: ['superadmin'] });
  if (!user) return;

  settings = await NexusCMS.fetchSettings();
  FORM_KEYS.forEach((key) => {
    const element = document.getElementById(`s_${key}`);
    if (element) {
      element.value = settings[key] || '';
    }
  });

  teamMembers = Array.isArray(settings.teamMembers) && settings.teamMembers.length
    ? clone(settings.teamMembers)
    : [];
  renderTeamMembers();
})();
</script>

<!-- PWA Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then((reg) => {
        console.log('[App] Service Worker registered:', reg);
        setInterval(() => {
          reg.update().catch(err => console.warn('[App] Update check failed:', err));
        }, 60000);
      })
      .catch((err) => console.warn('[App] Service Worker registration failed:', err));
  });
}
</script>
</body>
</html>
