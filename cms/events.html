<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Events - NEXUS CMS</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dwqffkzp0/image/upload/v1775916069/Gemini_Generated_Image_7zzc6z7zzc6z7zzc_klsqtk.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#060810">
<meta name="description" content="NEXUS CMS - Event Management & Championship Platform">
<script src="cms-core.js"></script>
<style id="cmsStyle"></style>
<style>
.editor-block{margin-top:24px}
.editor-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.entity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:16px}
.entity-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:16px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.entity-card:hover{border-color:rgba(245,166,35,0.5);transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.entity-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.entity-card-preview{width:100%;height:140px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.04);margin-bottom:12px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px}
.entity-card-preview img{width:100%;height:100%;object-fit:cover;display:block}
.entity-card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:6px;color:var(--text)}
.entity-card-meta{display:flex;gap:8px;font-size:11px;color:var(--muted);margin-bottom:10px}
.entity-card-meta span{background:rgba(245,166,35,0.08);padding:4px 8px;border-radius:6px}
.entity-card-actions{display:flex;gap:8px;margin-top:12px}
.entity-card-actions button{flex:1;padding:8px;font-size:12px;border-radius:8px;border:none;cursor:pointer}
.event-edit-btn{background:rgba(245,166,35,0.2);color:#f5a623;font-weight:600}
.event-edit-btn:hover{background:rgba(245,166,35,0.3)}
.event-delete-btn{background:rgba(230,60,92,0.15);color:#e63c5c;font-weight:600}
.event-delete-btn:hover{background:rgba(230,60,92,0.25)}

/* Editor Panel */
.editor-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:900;overflow-y:auto;backdrop-filter:blur(4px)}
.editor-overlay.active{display:block}
.editor-panel{background:var(--bg);min-height:100vh;max-width:900px;margin:0 auto;padding:40px 32px}
.editor-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;gap:16px;position:relative}
.editor-panel-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--accent)}
.editor-close-btn{background:transparent;border:1px solid rgba(255,255,255,0.2);width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:24px;cursor:pointer;transition:all 0.2s}
.editor-close-btn:hover{border-color:var(--accent);color:var(--accent)}
.editor-section{margin-bottom:32px}
.editor-section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;color:var(--accent);border-bottom:1px solid rgba(245,166,35,0.2);padding-bottom:12px}
.editor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.editor-grid.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;font-weight:600;color:var(--text)}
.form-group input[type="text"],.form-group input[type="url"],.form-group input[type="color"],.form-group textarea{background:var(--surface);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.form-group input:.form-group textarea:focus{border-color:rgba(245,166,35,0.3)}
.form-group input[type="color"]{height:46px;padding:6px}
.form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.upload-row{display:flex;gap:8px;align-items:center;margin-top:6px}
.upload-row input[type="file"]{padding:10px;flex:1}
.upload-note{font-size:11px;color:var(--muted);margin-top:6px}
.subeditor{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06)}
.subeditor-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.subeditor-header strong{font-size:14px;font-weight:700}
.subeditor-list{display:flex;flex-direction:column;gap:12px}
.subeditor-item{padding:14px;border-radius:10px;background:var(--surface);border:1px solid rgba(255,255,255,0.06)}
.helper{font-size:12px;color:var(--muted)}
.editor-actions-footer{display:flex;gap:12px;margin-top:40px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.06);justify-content:flex-end}
.btn-save{background:linear-gradient(135deg,#f5a623,#d4890f);color:#000;padding:12px 32px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;border:none;cursor:pointer;transition:all 0.2s}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(245,166,35,0.3)}
.btn-cancel{background:transparent;color:var(--text);padding:12px 32px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-cancel:hover{border-color:var(--text)}
</style>
</head>
<body>
<div id="sidebarContainer"></div>
<main class="cms-main">
  <div class="cms-header" style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap">
    <div><h1>Events</h1><p>Edit the public events section, event cards, rounds, and rules modal content.</p></div>
    <div style="display:flex;gap:10px">
      <a href="../index.html#events" target="_blank" class="cms-btn" style="background:rgba(245,166,35,0.1);color:#f5a623;text-decoration:none;padding:10px 20px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px">Preview</a>
      <button class="cms-btn cms-btn-primary" onclick="saveEventsSettings()">Save Changes</button>
    </div>
  </div>

  <div class="cms-card">
    <div class="cms-card-title">Events Section Header</div>
    <div class="form-group"><label>Section Tag</label><input type="text" id="eventsSectionTag" placeholder="Compete"></div>
    <div class="form-group"><label>Section Title</label><input type="text" id="eventsSectionTitle" placeholder="All Events"></div>
    <div class="form-group"><label>Section Description</label><textarea id="eventsSectionDesc" rows="3" placeholder="Choose your battleground..."></textarea></div>
  </div>

  <div class="cms-card editor-block">
    <div class="editor-actions">
      <div>
        <div class="cms-card-title" style="margin-bottom:4px">Events</div>
        <p class="helper">Click an event to edit, or add a new one below.</p>
      </div>
      <button class="cms-btn cms-btn-primary" onclick="openEventEditor('new')">+ Add Event</button>
    </div>
    <div id="eventsEditorGrid" class="entity-grid"></div>
  </div>
</main>

<!-- Event Editor Overlay -->
<div id="editorOverlay" class="editor-overlay">
  <div class="editor-panel">
    <div class="editor-panel-header">
      <div style="flex:1">
        <div class="editor-panel-title" id="editorTitle">Add Event</div>
      </div>
      <button class="editor-close-btn" onclick="closeEventEditor()">✕</button>
    </div>
    <div id="editorContent"></div>
    <div class="editor-actions-footer">
      <button class="btn-cancel" onclick="closeEventEditor()">Cancel</button>
      <button class="btn-save" onclick="saveEventEditor()">Save Event</button>
    </div>
  </div>
</div>
<script>
const DEFAULT_SECTION = {
  eventsSectionTag: 'Compete',
  eventsSectionTitle: 'All Events',
  eventsSectionDesc: 'Choose your battleground. Every event is a chance to prove your edge.'
};

const DEFAULT_EVENTS = [
  {
    id: 'finverse',
    name: 'FINVERSE',
    dept: 'Finance',
    deptColor: '#00d4ff',
    tagline: 'Where numbers meet nerves',
    badge: 'Finance',
    badgeBg: 'rgba(0,212,255,0.1)',
    badgeColor: '#00d4ff',
    imageUrl: '',
    rounds: [
      { id: 'r1', num: 'R1', title: 'Link & Think', desc: 'Logo identification and brand slogans', time: '30 min', color: '#00d4ff' },
      { id: 'r2', num: 'R2', title: 'Cash Clash', desc: 'Budget Battle - Finance Ministers', time: '60 min', color: '#00bfe0' },
      { id: 'r3', num: 'R3', title: 'Bid to Win', desc: 'Live Auction - highest bidder wins', time: '90 min', color: '#0099bb' }
    ],
    rules: {
      title: 'FINVERSE - Rules & Regulations',
      sections: [
        { id: 's1', heading: 'Round 1: Link & Think', rules: ['Each team: 1 participant','Accurate spelling required for full marks'] },
        { id: 's2', heading: 'Round 2: Cash Clash', rules: ['1 participant per team','Judges decision is final'] }
      ]
    }
  },
  {
    id: 'asventiq',
    name: 'ASVENTIQ',
    dept: 'Marketing',
    deptColor: '#f5a623',
    tagline: 'Build. Brand. Advertise. Win.',
    badge: 'Marketing',
    badgeBg: 'rgba(245,166,35,0.1)',
    badgeColor: '#f5a623',
    imageUrl: '',
    rounds: [
      { id: 'r1', num: 'R1', title: 'IdeaNest', desc: 'Business plan - startup to solve real problems', time: '60 min', color: '#f5a623' }
    ],
    rules: {
      title: 'ASVENTIQ - Rules & Regulations',
      sections: [
        { id: 's1', heading: 'General Rules', rules: ['Create a startup idea solving a real problem'] }
      ]
    }
  }
];

let settings = {};
let events = [];
let scrollPos = 0;
let focusedElementId = null;
let focusedCursorPos = 0;
let currentEditingEventId = null;

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function preserveScrollAndFocus() {
  scrollPos = window.scrollY;
  const active = document.activeElement;
  if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) {
    focusedElementId = active.id || `${active.name}-${Math.random()}`;
    active.id = focusedElementId;
    focusedCursorPos = active.selectionStart || 0;
  }
}

function restoreScrollAndFocus() {
  window.requestAnimationFrame(() => {
    window.scrollY !== scrollPos && window.scrollTo(0, scrollPos);
    if (focusedElementId) {
      const el = document.getElementById(focusedElementId);
      if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
        el.focus();
        el.setSelectionRange(focusedCursorPos, focusedCursorPos);
      }
    }
  });
}

function uid(prefix) {
  return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
}

function slugify(value) {
  return String(value || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || uid('event');
}

function normalizeColor(value, fallback) {
  return /^#[0-9a-fA-F]{6}$/.test(String(value || '')) ? value : fallback;
}

function makeEvent() {
  return {
    id: uid('event'),
    name: '',
    dept: '',
    deptColor: '#f5a623',
    tagline: '',
    badge: '',
    badgeBg: 'rgba(245,166,35,0.1)',
    badgeColor: '#f5a623',
    imageUrl: '',
    rounds: [
      { id: uid('round'), num: 'R1', title: '', desc: '', time: '', color: '#f5a623' }
    ],
    rules: {
      title: 'Rules & Regulations',
      sections: [
        { id: uid('section'), heading: 'General Rules', rules: [''] }
      ]
    }
  };
}

function renderEvents() {
  const grid = document.getElementById('eventsEditorGrid');
  grid.innerHTML = events.map((event, index) => `
    <div class="entity-card" onclick="openEventEditor('${event.id}')">
      <div class="entity-card-preview">${event.imageUrl ? `<img src="${event.imageUrl}" alt="${event.name || 'Event image'}" onerror="this.style.display='none'">` : '📋'}</div>
      <div class="entity-card-name">${event.name || 'Untitled Event'}</div>
      <div class="entity-card-meta">
        <span>${event.dept || 'No Dept'}</span>
        <span>${(event.rounds || []).length} rounds</span>
      </div>
      <div class="entity-card-actions" onclick="event.stopPropagation()">
        <button class="event-edit-btn" onclick="openEventEditor('${event.id}')">Edit</button>
        <button class="event-delete-btn" onclick="removeEvent('${event.id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function renderEventEditor(eventId) {
  const event = eventId === 'new' ? makeEvent() : events.find(e => e.id === eventId);
  if (!event) return;
  
  const panel = document.getElementById('editorContent');
  panel.innerHTML = `
    <div class="editor-section">
      <div class="editor-section-title">Basic Information</div>
      <div class="editor-grid">
        <div class="form-group">
          <label>Event Name</label>
          <input type="text" id="editor_name" value="${event.name || ''}" placeholder="e.g., FINVERSE">
        </div>
        <div class="form-group">
          <label>Event ID / Slug</label>
          <input type="text" id="editor_id" value="${event.id || ''}" placeholder="e.g., finverse">
        </div>
        <div class="form-group">
          <label>Department</label>
          <input type="text" id="editor_dept" value="${event.dept || ''}" placeholder="e.g., Finance">
        </div>
        <div class="form-group">
          <label>Badge Text</label>
          <input type="text" id="editor_badge" value="${event.badge || ''}" placeholder="e.g., Finance">
        </div>
      </div>
      <div class="form-group full" style="grid-column:1/-1;margin-top:16px">
        <label>Tagline / Description</label>
        <textarea id="editor_tagline" rows="2" placeholder="e.g., Where numbers meet nerves">${event.tagline || ''}</textarea>
      </div>
    </div>

    <div class="editor-section">
      <div class="editor-section-title">Image & Media</div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" id="editor_imageUrl" value="${event.imageUrl || ''}" placeholder="https://example.com/image.jpg">
      </div>
      <div class="form-group">
        <label>Upload Image</label>
        <div class="upload-row">
          <input type="file" id="editor_upload" accept="image/*">
          <button class="cms-btn cms-btn-primary cms-btn-sm" onclick="uploadEventImage('${event.id}')">Upload</button>
        </div>
      </div>
    </div>

    <div class="editor-section">
      <div class="editor-section-title">Styling</div>
      <div class="editor-grid">
        <div class="form-group">
          <label>Department Color</label>
          <input type="color" id="editor_deptColor" value="${normalizeColor(event.deptColor, '#f5a623')}" style="height:46px">
        </div>
        <div class="form-group">
          <label>Badge Color</label>
          <input type="color" id="editor_badgeColor" value="${normalizeColor(event.badgeColor, '#f5a623')}" style="height:46px">
        </div>
        <div class="form-group">
          <label>Badge Background</label>
          <input type="text" id="editor_badgeBg" value="${event.badgeBg || ''}" placeholder="rgba(245,166,35,0.1)">
        </div>
      </div>
    </div>

    <div class="editor-section">
      <div class="editor-section-title">Event Coordinators (New System)</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Replace the old Faculty/Organizers system with structured coordinator data including phone numbers</p>
      
      <div style="margin-bottom:20px">
        <h4 style="font-weight:600;margin-bottom:12px">Faculty Coordinators</h4>
        <div id="facultyCoordinatorsList"></div>
        <button class="cms-btn cms-btn-primary cms-btn-sm" onclick="addCoordinator('${event.id}','faculty')" style="margin-top:8px">+ Add Faculty</button>
      </div>
      
      <div style="margin-bottom:20px">
        <h4 style="font-weight:600;margin-bottom:12px">Student Coordinators</h4>
        <div id="studentCoordinatorsList"></div>
        <button class="cms-btn cms-btn-primary cms-btn-sm" onclick="addCoordinator('${event.id}','student')" style="margin-top:8px">+ Add Student</button>
      </div>
    </div>

    <div class="editor-section">
      <div class="editor-section-title">Rounds <button class="cms-btn cms-btn-primary cms-btn-sm" onclick="addRound('${event.id}')" style="margin-left:auto">+ Add Round</button></div>
      <div id="roundsList" class="subeditor-list">
        ${(event.rounds || []).map((round, rIdx) => `
          <div class="subeditor-item">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
              <strong>Round ${rIdx + 1}</strong>
              <button class="cms-btn cms-btn-danger cms-btn-sm" onclick="removeRound('${event.id}','${round.id}')">Remove</button>
            </div>
            <div class="editor-grid" style="gap:12px">
              <div class="form-group">
                <label>Round Label</label>
                <input type="text" value="${round.num || ''}" oninput="updateRound('${event.id}','${round.id}','num',this.value)">
              </div>
              <div class="form-group">
                <label>Time</label>
                <input type="text" value="${round.time || ''}" oninput="updateRound('${event.id}','${round.id}','time',this.value)">
              </div>
              <div class="form-group" style="grid-column:1/-1">
                <label>Title</label>
                <input type="text" value="${round.title || ''}" oninput="updateRound('${event.id}','${round.id}','title',this.value)">
              </div>
              <div class="form-group" style="grid-column:1/-1">
                <label>Description</label>
                <textarea rows="2" oninput="updateRound('${event.id}','${round.id}','desc',this.value)">${round.desc || ''}</textarea>
              </div>
              <div class="form-group">
                <label>Color</label>
                <input type="color" value="${normalizeColor(round.color, '#f5a623')}" style="height:46px" oninput="updateRound('${event.id}','${round.id}','color',this.value)">
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="editor-section">
      <div class="editor-section-title">Rules & Regulations</div>
      <div class="form-group" style="margin-bottom:16px">
        <label>Rules Modal Title</label>
        <input type="text" id="editor_rules_title" value="${event.rules?.title || ''}" placeholder="e.g., FINVERSE - Rules & Regulations">
      </div>
      <div style="margin-top:12px">
        <div style="display:flex;align-items:center;margin-bottom:12px">
          <strong>Rule Sections</strong>
          <button class="cms-btn cms-btn-primary cms-btn-sm" onclick="addRuleSection('${event.id}')" style="margin-left:auto">+ Add Section</button>
        </div>
        <div id="sectionsList" class="subeditor-list">
          ${(event.rules?.sections || []).map((section, sIdx) => `
            <div class="subeditor-item">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <strong>Section ${sIdx + 1}</strong>
                <button class="cms-btn cms-btn-danger cms-btn-sm" onclick="removeRuleSection('${event.id}','${section.id}')">Remove</button>
              </div>
              <div class="form-group" style="margin-bottom:12px">
                <label>Section Heading</label>
                <input type="text" value="${section.heading || ''}" oninput="updateRuleSectionHeading('${event.id}','${section.id}',this.value)">
              </div>
              <div class="form-group">
                <label>Rules (one per line)</label>
                <textarea rows="5" oninput="updateRuleSectionRules('${event.id}','${section.id}',this.value)">${(section.rules || []).join('\n')}</textarea>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
  
  // Populate coordinator lists
  const facultyList = document.getElementById('facultyCoordinatorsList');
  const studentList = document.getElementById('studentCoordinatorsList');
  const coordinators = event.coordinators || [];
  
  if (facultyList) {
    const faculty = coordinators.filter(c => c.type === 'faculty');
    facultyList.innerHTML = faculty.map((coord, idx) => {
      const coordIndex = coordinators.indexOf(coord);
      return `
        <div style="display:grid;grid-template-columns:1fr 1fr 60px;gap:8px;margin-bottom:8px;padding:12px;background:rgba(255,255,255,0.03);border-radius:8px;align-items:end">
          <input type="text" value="${coord.name || ''}" placeholder="e.g., Prof. Name" style="padding:8px;background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--text)" oninput="updateCoordinator('${event.id}',${coordIndex},'name',this.value)">
          <input type="text" value="${coord.phone || ''}" placeholder="Phone number" style="padding:8px;background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--text)" oninput="updateCoordinator('${event.id}',${coordIndex},'phone',this.value)">
          <button class="cms-btn cms-btn-danger cms-btn-sm" onclick="removeCoordinator('${event.id}',${coordIndex})">Remove</button>
        </div>
      `;
    }).join('') || '<p style="color:var(--muted);font-size:12px">No faculty coordinators added yet</p>';
  }
  
  if (studentList) {
    const students = coordinators.filter(c => c.type === 'student');
    studentList.innerHTML = students.map((coord, idx) => {
      const coordIndex = coordinators.indexOf(coord);
      return `
        <div style="display:grid;grid-template-columns:1fr 1fr 60px;gap:8px;margin-bottom:8px;padding:12px;background:rgba(255,255,255,0.03);border-radius:8px;align-items:end">
          <input type="text" value="${coord.name || ''}" placeholder="e.g., Student Name" style="padding:8px;background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--text)" oninput="updateCoordinator('${event.id}',${coordIndex},'name',this.value)">
          <input type="text" value="${coord.phone || ''}" placeholder="Phone number" style="padding:8px;background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--text)" oninput="updateCoordinator('${event.id}',${coordIndex},'phone',this.value)">
          <button class="cms-btn cms-btn-danger cms-btn-sm" onclick="removeCoordinator('${event.id}',${coordIndex})">Remove</button>
        </div>
      `;
    }).join('') || '<p style="color:var(--muted);font-size:12px">No student coordinators added yet</p>';
  }
}

function openEventEditor(eventId) {
  currentEditingEventId = eventId;
  
  // If it's a new event, add it to the events array immediately
  if (eventId === 'new') {
    const newEvent = makeEvent();
    currentEditingEventId = newEvent.id;
    events.push(newEvent);
  }
  
  document.getElementById('editorTitle').textContent = eventId === 'new' ? 'Add New Event' : 'Edit Event';
  renderEventEditor(currentEditingEventId);
  document.getElementById('editorOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeEventEditor() {
  document.getElementById('editorOverlay').classList.remove('active');
  document.body.style.overflow = '';
  currentEditingEventId = null;
}

function saveEventEditor() {
  if (!currentEditingEventId) return;
  
  const eventId = currentEditingEventId;
  const newId = slugify(document.getElementById('editor_id').value || eventId);
  
  events = events.map((event) => {
    if (event.id !== eventId) return event;
    return {
      ...event,
      id: newId,
      name: document.getElementById('editor_name').value || '',
      dept: document.getElementById('editor_dept').value || '',
      badge: document.getElementById('editor_badge').value || '',
      tagline: document.getElementById('editor_tagline').value || '',
      imageUrl: document.getElementById('editor_imageUrl').value || '',
      deptColor: document.getElementById('editor_deptColor').value || '#f5a623',
      badgeColor: document.getElementById('editor_badgeColor').value || '#f5a623',
      badgeBg: document.getElementById('editor_badgeBg').value || 'rgba(245,166,35,0.1)',
      coordinators: event.coordinators || [],
      rules: {
        title: document.getElementById('editor_rules_title').value || 'Rules & Regulations',
        sections: event.rules?.sections || []
      }
    };
  });
  
  // Update currentEditingEventId if the ID changed
  if (newId !== eventId) {
    currentEditingEventId = newId;
  }
  
  // Save to database immediately
  saveEventsSettings().then(() => {
    renderEvents();
    closeEventEditor();
  }).catch(err => {
    console.error('Failed to save event:', err);
    alert('Error saving event. Please try again.');
  });
}

function updateEvent(id, key, value) {
  events = events.map((event) => {
    if (event.id !== id) return event;
    const next = { ...event, [key]: value };
    if (key === 'id') next.id = slugify(value || event.name || 'event');
    if (key === 'name' && (!event.id || event.id === slugify(event.name))) next.id = slugify(value);
    return next;
  });
  renderEventEditor(currentEditingEventId);
}

function removeEvent(id) {
  if (confirm('Are you sure you want to delete this event?')) {
    events = events.filter((event) => event.id !== id);
    renderEvents();
  }
}

async function uploadEventImage(id) {
  const input = document.getElementById('editor_upload');
  const file = input && input.files ? input.files[0] : null;
  if (!file) {
    showToast('Choose an image first.', 'error');
    return;
  }
  try {
    const imageUrl = await NexusCMS.uploadImage(file);
    document.getElementById('editor_imageUrl').value = imageUrl;
    showToast('Event image uploaded successfully!');
  } catch (error) {
    showToast(error.message || 'Upload failed', 'error');
  }
}

function updateRound(eventId, roundId, key, value) {
  events = events.map((event) => event.id === eventId ? { ...event, rounds: (event.rounds || []).map((round) => round.id === roundId ? { ...round, [key]: value } : round) } : event);
}

function addRound(eventId) {
  events = events.map((event) => event.id === eventId ? { ...event, rounds: [...(event.rounds || []), { id: uid('round'), num: `R${(event.rounds || []).length + 1}`, title: '', desc: '', time: '', color: '#f5a623' }] } : event);
  renderEventEditor(eventId);
}

function removeRound(eventId, roundId) {
  events = events.map((event) => event.id === eventId ? { ...event, rounds: (event.rounds || []).filter((round) => round.id !== roundId) } : event);
  renderEventEditor(eventId);
}

function addCoordinator(eventId, type) {
  events = events.map((event) => {
    if (event.id === eventId) {
      const coordinators = event.coordinators || [];
      coordinators.push({ type, name: '', phone: '' });
      return { ...event, coordinators };
    }
    return event;
  });
  renderEventEditor(eventId);
}

function removeCoordinator(eventId, index) {
  events = events.map((event) => {
    if (event.id === eventId) {
      const coordinators = (event.coordinators || []).filter((_, i) => i !== index);
      return { ...event, coordinators };
    }
    return event;
  });
  renderEventEditor(eventId);
}

function updateCoordinator(eventId, index, field, value) {
  events = events.map((event) => {
    if (event.id === eventId) {
      const coordinators = event.coordinators || [];
      if (coordinators[index]) coordinators[index][field] = value;
      return { ...event, coordinators };
    }
    return event;
  });
}

function updateEventRuleTitle(eventId, value) {
  events = events.map((event) => event.id === eventId ? { ...event, rules: { ...(event.rules || {}), title: value, sections: event.rules?.sections || [] } } : event);
}

function addRuleSection(eventId) {
  events = events.map((event) => event.id === eventId ? { ...event, rules: { ...(event.rules || {}), title: event.rules?.title || 'Rules & Regulations', sections: [...(event.rules?.sections || []), { id: uid('section'), heading: '', rules: [''] }] } } : event);
  renderEventEditor(eventId);
}

function removeRuleSection(eventId, sectionId) {
  events = events.map((event) => event.id === eventId ? { ...event, rules: { ...(event.rules || {}), sections: (event.rules?.sections || []).filter((section) => section.id !== sectionId) } } : event);
  renderEventEditor(eventId);
}

function updateRuleSectionHeading(eventId, sectionId, value) {
  events = events.map((event) => event.id === eventId ? { ...event, rules: { ...(event.rules || {}), sections: (event.rules?.sections || []).map((section) => section.id === sectionId ? { ...section, heading: value } : section) } } : event);
}

function updateRuleSectionRules(eventId, sectionId, value) {
  const rules = String(value || '').split('\n').map((line) => line.trim()).filter(Boolean);
  events = events.map((event) => event.id === eventId ? { ...event, rules: { ...(event.rules || {}), sections: (event.rules?.sections || []).map((section) => section.id === sectionId ? { ...section, rules } : section) } } : event);
}

async function saveEventsSettings() {
  const nextSettings = { ...settings };
  nextSettings.eventsSectionTag = document.getElementById('eventsSectionTag').value;
  nextSettings.eventsSectionTitle = document.getElementById('eventsSectionTitle').value;
  nextSettings.eventsSectionDesc = document.getElementById('eventsSectionDesc').value;
  nextSettings.events = events.map((event) => ({
    id: slugify(event.id || event.name),
    name: String(event.name || '').trim(),
    dept: String(event.dept || '').trim(),
    deptColor: String(event.deptColor || '#f5a623').trim(),
    tagline: String(event.tagline || '').trim(),
    badge: String(event.badge || '').trim(),
    badgeBg: String(event.badgeBg || 'rgba(245,166,35,0.1)').trim(),
    badgeColor: String(event.badgeColor || '#f5a623').trim(),
    coordinators: (event.coordinators || []).map((coord) => ({
      type: String(coord.type || 'faculty').trim(),
      name: String(coord.name || '').trim(),
      phone: String(coord.phone || '').trim()
    })).filter((coord) => coord.name && coord.phone),
    imageUrl: String(event.imageUrl || '').trim(),
    rounds: (event.rounds || []).map((round, index) => ({
      id: round.id || uid('round'),
      num: String(round.num || `R${index + 1}`).trim(),
      title: String(round.title || '').trim(),
      desc: String(round.desc || '').trim(),
      time: String(round.time || '').trim(),
      color: String(round.color || '#f5a623').trim()
    })).filter((round) => round.title || round.desc || round.num),
    rules: {
      title: String(event.rules?.title || `${event.name || 'Event'} - Rules & Regulations`).trim(),
      sections: (event.rules?.sections || []).map((section) => ({
        id: section.id || uid('section'),
        heading: String(section.heading || '').trim(),
        rules: (section.rules || []).map((rule) => String(rule || '').trim()).filter(Boolean)
      })).filter((section) => section.heading || section.rules.length)
    }
  })).filter((event) => event.name);

  await NexusCMS.updateSettings(nextSettings);
  settings = nextSettings;
  showToast('Events saved!');
}

(async function () {
  const user = await NexusCMS.initPage('events', { requiredRoles: ['superadmin'] });
  if (!user) return;

  settings = { ...DEFAULT_SECTION, ...(await NexusCMS.fetchSettings()) };
  document.getElementById('eventsSectionTag').value = settings.eventsSectionTag || DEFAULT_SECTION.eventsSectionTag;
  document.getElementById('eventsSectionTitle').value = settings.eventsSectionTitle || DEFAULT_SECTION.eventsSectionTitle;
  document.getElementById('eventsSectionDesc').value = settings.eventsSectionDesc || DEFAULT_SECTION.eventsSectionDesc;
  events = 'events' in settings ? (Array.isArray(settings.events) ? clone(settings.events) : []) : clone(DEFAULT_EVENTS);
  renderEvents();
  
  // Close editor when clicking outside the panel
  document.getElementById('editorOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('editorOverlay')) {
      closeEventEditor();
    }
  });
})();
</script>
