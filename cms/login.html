<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CMS - Login</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dwqffkzp0/image/upload/v1775916069/Gemini_Generated_Image_7zzc6z7zzc6z7zzc_klsqtk.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#060810">
<meta name="description" content="NEXUS CMS - Event Management & Championship Platform">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060810;--surface:#111827;--accent:#f5a623;--accent2:#e63c5c;--text:#f0f0f0;--muted:#7a8499;--border:rgba(255,255,255,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(245,166,35,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 30%,transparent 80%);pointer-events:none}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(245,166,35,0.1),transparent 70%);top:-100px;right:-100px}
.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(230,60,92,0.08),transparent 70%);bottom:-50px;left:-50px}
.login-card{background:var(--surface);border:1px solid rgba(245,166,35,0.15);border-radius:20px;padding:48px;width:100%;max-width:420px;position:relative;animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1)}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:20px 20px 0 0}
@keyframes cardIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-mark{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#000}
.login-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:20px}
h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;text-align:center;margin-bottom:6px}
.login-sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:32px}
.form-group{margin-bottom:20px}
label{display:block;font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all 0.2s}
input:focus{border-color:rgba(245,166,35,0.4);background:rgba(245,166,35,0.04)}
.password-container{position:relative;width:100%}
.password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 8px;transition:color 0.2s;display:flex;align-items:center;justify-content:center}
.password-toggle:hover{color:var(--accent)}
.btn{width:100%;background:linear-gradient(135deg,var(--accent),#d4890f);color:#000;padding:16px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;border:none;cursor:pointer;transition:all 0.3s;margin-top:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 16px 32px rgba(245,166,35,0.25)}
.error{background:rgba(230,60,92,0.1);border:1px solid rgba(230,60,92,0.3);border-radius:8px;padding:12px 16px;font-size:13px;color:#e63c5c;margin-bottom:16px;display:none}
.back-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
.back-link a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="login-card">
  <div class="login-logo">
    <div class="login-mark">N</div>
    <span class="login-brand">NEXUS CMS</span>
  </div>
  <h2>Welcome Back</h2>
  <p class="login-sub">Sign in to manage NEXUS 2026</p>
  <div class="error" id="errMsg">Invalid username or password.</div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="password-container">
      <input type="password" id="password" placeholder="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
      <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password', event)">👁️</button>
    </div>
  </div>
  <button class="btn" onclick="login()">Sign In</button>
  <div class="back-link"><a href="../index.html">Back to NEXUS</a></div>
</div>
<script>
function getLandingPage(user) {
  if (!user) return 'dashboard.html';
  if (user.role === 'judge') return 'judge.html';
  if (user.role === 'checkin') return 'checkin.html';
  return 'dashboard.html';
}

function togglePasswordVisibility(fieldId, evt) {
  const field = document.getElementById(fieldId);
  const btn = evt.target.closest('.password-toggle');
  if (field.type === 'password') {
    field.type = 'text';
    btn.textContent = '🙈';
  } else {
    field.type = 'password';
    btn.textContent = '👁️';
  }
}

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value; // Don't trim — passwords can have spaces
  const errorBox = document.getElementById('errMsg');

  errorBox.style.display = 'none';

  if (!username || !password) {
    errorBox.textContent = 'Enter both username and password.';
    errorBox.style.display = 'block';
    return;
  }

  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || 'Login failed');
    }

    sessionStorage.setItem('nexus_token', data.token);
    sessionStorage.setItem('nexus_user', JSON.stringify(data.user));
    window.location.href = getLandingPage(data.user);
  } catch (error) {
    errorBox.textContent = error.message || 'Invalid username or password.';
    errorBox.style.display = 'block';
  }
}

(async function checkSession() {
  const token = sessionStorage.getItem('nexus_token');
  if (!token) return;

  try {
    const response = await fetch('/api/auth/me', {
      headers: { Authorization: `Bearer ${token}` }
    });

    if (response.ok) {
      const data = await response.json();
      sessionStorage.setItem('nexus_user', JSON.stringify(data.user));
      window.location.href = getLandingPage(data.user);
      return;
    }
  } catch (error) {
    // Ignore and allow normal login flow.
  }

  sessionStorage.removeItem('nexus_token');
  sessionStorage.removeItem('nexus_user');
})();
</script>

<!-- PWA Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(reg => {
        setInterval(() => reg.update().catch(() => {}), 60000);
      }).catch(() => {});
  });
}
</script>
</body>
</html>
