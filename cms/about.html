<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>About - NEXUS CMS</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dwqffkzp0/image/upload/v1775916069/Gemini_Generated_Image_7zzc6z7zzc6z7zzc_klsqtk.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#060810">
<meta name="description" content="NEXUS CMS - About & Contributors Management">
<script src="cms-core.js"></script>
<style id="cmsStyle"></style>
<style>
.editor-block{margin-top:24px}
.editor-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.contributor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:16px}
.contributor-item{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:16px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.contributor-item:hover{border-color:rgba(245,166,35,0.5);transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.contributor-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.contributor-preview{width:100%;height:140px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.04);margin-bottom:12px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:40px}
.contributor-preview img{width:100%;height:100%;object-fit:cover;display:block}
.contributor-name{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:6px;color:var(--text)}
.contributor-role{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}
.contributor-dept{font-size:12px;color:var(--muted);margin-bottom:10px}
.contributor-actions{display:flex;gap:8px;margin-top:12px}
.contributor-actions button{flex:1;padding:8px;font-size:12px;border-radius:8px;border:none;cursor:pointer}
.contrib-edit-btn{background:rgba(245,166,35,0.2);color:#f5a623;font-weight:600}
.contrib-edit-btn:hover{background:rgba(245,166,35,0.3)}
.contrib-delete-btn{background:rgba(230,60,92,0.15);color:#e63c5c;font-weight:600}
.contrib-delete-btn:hover{background:rgba(230,60,92,0.25)}

.editor-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:900;overflow-y:auto;backdrop-filter:blur(4px)}
.editor-overlay.active{display:block}
.editor-panel{background:var(--bg);min-height:100vh;max-width:900px;margin:0 auto;padding:40px 32px}
.editor-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;gap:16px;position:relative}
.editor-panel-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--accent)}
.editor-close-btn{background:transparent;border:1px solid rgba(255,255,255,0.2);width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:24px;cursor:pointer;transition:all 0.2s}
.editor-close-btn:hover{border-color:var(--accent);color:var(--accent)}
.editor-section{margin-bottom:32px}
.editor-section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;color:var(--accent);border-bottom:1px solid rgba(245,166,35,0.2);padding-bottom:12px}
.editor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.editor-grid.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;font-weight:600;color:var(--text)}
.form-group input[type="text"],.form-group input[type="url"],.form-group textarea,.form-group select{background:var(--surface);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:rgba(245,166,35,0.3)}
.upload-row{display:flex;gap:8px;align-items:center;margin-top:6px}
.upload-row input[type="file"]{padding:10px;flex:1}
.upload-note{font-size:11px;color:var(--muted);margin-top:6px}
.helper{font-size:12px;color:var(--muted)}
.editor-actions-footer{display:flex;gap:12px;margin-top:40px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.06);justify-content:flex-end}
.btn-save{background:linear-gradient(135deg,#f5a623,#d4890f);color:#000;padding:12px 32px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;border:none;cursor:pointer;transition:all 0.2s}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(245,166,35,0.3)}
.btn-cancel{background:transparent;color:var(--text);padding:12px 32px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-cancel:hover{border-color:var(--text)}
</style>
</head>
<body>
<div id="sidebarContainer"></div>
<main class="cms-main">
  <div class="cms-header" style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap">
    <div><h1>About Us</h1><p>Manage event contributors, coordinators, and leadership team members.</p></div>
    <div style="display:flex;gap:10px">
      <a href="../index.html#aboutus" target="_blank" class="cms-btn" style="background:rgba(245,166,35,0.1);color:#f5a623;text-decoration:none;padding:10px 20px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px">Preview</a>
      <button class="cms-btn cms-btn-primary" onclick="saveAboutSettings()">Save Changes</button>
    </div>
  </div>

  <div class="cms-card">
    <div class="cms-card-title">About Section Header</div>
    <div class="form-group"><label>Section Tag</label><input type="text" id="aboutSectionTag" placeholder="Know The Team"></div>
    <div class="form-group"><label>Section Title</label><input type="text" id="aboutSectionTitle" placeholder="Event Contributors & Leadership"></div>
    <div class="form-group"><label>Section Description</label><textarea id="aboutSectionDesc" rows="3" placeholder="Meet the visionaries, coordinators, and student leaders..."></textarea></div>
  </div>

  <div class="cms-card editor-block">
    <div class="editor-actions">
      <div>
        <div class="cms-card-title" style="margin-bottom:4px">Contributors</div>
        <p class="helper">Add principal, coordinators, and other team members who contributed to the event.</p>
      </div>
      <button class="cms-btn cms-btn-primary" onclick="openContributorEditor('new')">+ Add Contributor</button>
    </div>
    <div id="contributorsEditorGrid" class="contributor-grid"></div>
  </div>
</main>

<!-- Contributor Editor Overlay -->
<div id="editorOverlay" class="editor-overlay">
  <div class="editor-panel">
    <div class="editor-panel-header">
      <div style="flex:1">
        <div class="editor-panel-title" id="editorTitle">Add Contributor</div>
      </div>
      <button class="editor-close-btn" onclick="closeContributorEditor()">✕</button>
    </div>
    <div id="editorContent"></div>
    <div class="editor-actions-footer">
      <button class="btn-cancel" onclick="closeContributorEditor()">Cancel</button>
      <button class="btn-save" onclick="saveContributorEditor()">Save Contributor</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_SECTION = {
  aboutSectionTag: 'Know The Team',
  aboutSectionTitle: 'Event Contributors & Leadership',
  aboutSectionDesc: 'Meet the visionaries, coordinators, and student leaders who made NEXUS possible.'
};

const CONTRIBUTOR_ROLES = [
  'Principal',
  'Admin',
  'Event Coordinator',
  'Student Coordinator',
  'Core Team Member',
  'Volunteer'
];

let settings = {};
let contributors = [];
let currentEditingId = null;

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function uid(prefix) {
  return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
}

function makeContributor() {
  return {
    id: uid('contrib'),
    name: '',
    role: 'Event Coordinator',
    dept: '',
    description: '',
    imageUrl: '',
    emoji: '👤',
    bgColor: 'linear-gradient(135deg,rgba(245,166,35,0.1),rgba(230,60,92,0.1))',
    mobile: ''
  };
}

function renderContributors() {
  const grid = document.getElementById('contributorsEditorGrid');
  grid.innerHTML = contributors.map((contrib, index) => `
    <div class="contributor-item" onclick="openContributorEditor('${contrib.id}')">
      <div class="contributor-preview" style="background:${contrib.bgColor || 'linear-gradient(135deg,rgba(245,166,35,0.1),rgba(230,60,92,0.1))'}">${contrib.imageUrl ? `<img src="${contrib.imageUrl}" alt="${contrib.name}" onerror="this.style.display='none'">` : contrib.emoji || '👤'}</div>
      <div class="contributor-name">${contrib.name || 'Untitled'}</div>
      <div class="contributor-role">${contrib.role || 'Contributor'}</div>
      <div class="contributor-dept">${contrib.dept || 'Department'}</div>
      <div class="contributor-actions" onclick="event.stopPropagation()">
        <button class="contrib-edit-btn" onclick="openContributorEditor('${contrib.id}')">Edit</button>
        <button class="contrib-delete-btn" onclick="removeContributor('${contrib.id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function renderContributorEditor(contribId) {
  const contrib = contribId === 'new' ? makeContributor() : contributors.find(c => c.id === contribId);
  if (!contrib) return;
  
  const panel = document.getElementById('editorContent');
  panel.innerHTML = `
    <div class="editor-section">
      <div class="editor-section-title">Basic Information</div>
      <div class="editor-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="editor_name" value="${contrib.name || ''}" placeholder="e.g., Dr. John Smith">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="editor_role">
            ${CONTRIBUTOR_ROLES.map(role => `<option value="${role}" ${contrib.role === role ? 'selected' : ''}>${role}</option>`).join('')}
            <option value="Other">Other (Custom)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Department / Position</label>
          <input type="text" id="editor_dept" value="${contrib.dept || ''}" placeholder="e.g., Principal, BBA Department">
        </div>
        <div class="form-group">
          <label>Emoji (if no image)</label>
          <input type="text" id="editor_emoji" value="${contrib.emoji || '👤'}" placeholder="👤" maxlength="2">
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="text" id="editor_mobile" value="${contrib.mobile || ''}" placeholder="+91 9876543210">
        </div>
      </div>
      <div class="form-group full" style="grid-column:1/-1;margin-top:16px">
        <label>About / Description</label>
        <textarea id="editor_desc" rows="3" placeholder="Brief description or bio">${contrib.description || ''}</textarea>
      </div>
    </div>

    <div class="editor-section">
      <div class="editor-section-title">Image & Styling</div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" id="editor_imageUrl" value="${contrib.imageUrl || ''}" placeholder="https://example.com/photo.jpg">
      </div>
      <div class="form-group">
        <label>Upload Image</label>
        <div class="upload-row">
          <input type="file" id="editor_upload" accept="image/*">
          <button class="cms-btn cms-btn-primary cms-btn-sm" onclick="uploadContributorImage()">Upload</button>
        </div>
        <div class="upload-note">Square image recommended (e.g., 500x500px)</div>
      </div>
      <div class="form-group">
        <label>Background Color (if no image)</label>
        <input type="text" id="editor_bgColor" value="${contrib.bgColor || ''}" placeholder="linear-gradient(135deg,rgba(245,166,35,0.1),rgba(230,60,92,0.1))">
      </div>
    </div>
  `;
}

function openContributorEditor(contribId) {
  currentEditingId = contribId;
  
  if (contribId === 'new') {
    const newContrib = makeContributor();
    currentEditingId = newContrib.id;
    contributors.push(newContrib);
  }
  
  document.getElementById('editorTitle').textContent = contribId === 'new' ? 'Add Contributor' : 'Edit Contributor';
  renderContributorEditor(currentEditingId);
  document.getElementById('editorOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeContributorEditor() {
  document.getElementById('editorOverlay').classList.remove('active');
  document.body.style.overflow = '';
  currentEditingId = null;
}

function saveContributorEditor() {
  if (!currentEditingId) return;
  
  const contribId = currentEditingId;
  
  contributors = contributors.map((contrib) => {
    if (contrib.id !== contribId) return contrib;
    return {
      ...contrib,
      name: document.getElementById('editor_name').value || '',
      role: document.getElementById('editor_role').value || 'Event Coordinator',
      dept: document.getElementById('editor_dept').value || '',
      description: document.getElementById('editor_desc').value || '',
      imageUrl: document.getElementById('editor_imageUrl').value || '',
      emoji: document.getElementById('editor_emoji').value || '👤',
      bgColor: document.getElementById('editor_bgColor').value || 'linear-gradient(135deg,rgba(245,166,35,0.1),rgba(230,60,92,0.1))',
      mobile: document.getElementById('editor_mobile').value || ''
    };
  });
  
  renderContributors();
  closeContributorEditor();
}

function removeContributor(id) {
  if (confirm('Are you sure you want to delete this contributor?')) {
    contributors = contributors.filter((contrib) => contrib.id !== id);
    renderContributors();
  }
}

async function uploadContributorImage() {
  const input = document.getElementById('editor_upload');
  const file = input && input.files ? input.files[0] : null;
  if (!file) {
    showToast('Choose an image first.', 'error');
    return;
  }
  try {
    const imageUrl = await NexusCMS.uploadImage(file);
    document.getElementById('editor_imageUrl').value = imageUrl;
    showToast('Image uploaded successfully!');
  } catch (error) {
    showToast(error.message || 'Upload failed', 'error');
  }
}

async function saveAboutSettings() {
  const nextSettings = { ...settings };
  nextSettings.aboutSectionTag = document.getElementById('aboutSectionTag').value;
  nextSettings.aboutSectionTitle = document.getElementById('aboutSectionTitle').value;
  nextSettings.aboutSectionDesc = document.getElementById('aboutSectionDesc').value;
  nextSettings.contributors = contributors.map((c) => ({
    id: c.id || uid('contrib'),
    name: String(c.name || '').trim(),
    role: String(c.role || 'Event Coordinator').trim(),
    dept: String(c.dept || '').trim(),
    description: String(c.description || '').trim(),
    imageUrl: String(c.imageUrl || '').trim(),
    emoji: String(c.emoji || '👤').trim(),
    bgColor: String(c.bgColor || 'linear-gradient(135deg,rgba(245,166,35,0.1),rgba(230,60,92,0.1))').trim(),
    mobile: String(c.mobile || '').trim()
  })).filter((c) => c.name);

  await NexusCMS.updateSettings(nextSettings);
  settings = nextSettings;
  showToast('About settings saved!');
}

(async function () {
  const user = await NexusCMS.initPage('about', { requiredRoles: ['superadmin'] });
  if (!user) return;

  settings = { ...DEFAULT_SECTION, ...(await NexusCMS.fetchSettings()) };
  document.getElementById('aboutSectionTag').value = settings.aboutSectionTag || DEFAULT_SECTION.aboutSectionTag;
  document.getElementById('aboutSectionTitle').value = settings.aboutSectionTitle || DEFAULT_SECTION.aboutSectionTitle;
  document.getElementById('aboutSectionDesc').value = settings.aboutSectionDesc || DEFAULT_SECTION.aboutSectionDesc;
  contributors = 'contributors' in settings ? (Array.isArray(settings.contributors) ? clone(settings.contributors) : []) : [];
  renderContributors();
  
  document.getElementById('editorOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('editorOverlay')) {
      closeContributorEditor();
    }
  });
})();
</script>

<!-- PWA Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then((reg) => {
        console.log('[App] Service Worker registered:', reg);
        setInterval(() => {
          reg.update().catch(err => console.warn('[App] Update check failed:', err));
        }, 60000);
      })
      .catch((err) => console.warn('[App] Service Worker registration failed:', err));
  });
}
</script>
</body>
</html>
